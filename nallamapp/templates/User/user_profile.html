{% extends 'User/user_home.html' %}
{% block content %}

<div class="w3l_banner_nav_right">
	<div class="container" style="padding-top: 100px;"></div>
	<h3>My Profile</h3>
			<br>
	<table class="table" border="0">

		{% for x in var %}
		<tr>
			<th>Name</th><td>{{x.name}}</td></tr>
			<tr>
		    <th>Address</th><td>{{x.address}}</td>
			</tr>
			<tr><th>Phone</th><td>{{x.phone}}</td></tr>
			<tr><th>Email</th><td>{{x.email}}</td></tr>
			<tr><th>Password</th><td>{{x.pswd}}</td></tr>
		</tr>
		<tr>
			<td><a href="/user_edit_profile/" class="btn btn-success">EDIT</a></td>
		</tr>
		{% endfor %}
	</table>
			<!-- <div class="w3l_banner_nav_right_banner3">
				<h3>Best Deals For New Products<span class="blink_me"></span></h3>
			</div> -->
			</div>

			<div class="container" style="height: auto;"></div>


{% endblock %}
